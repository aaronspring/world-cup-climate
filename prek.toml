minimum_prek_version = "0.3.0"

[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-yaml" },
    { id = "check-toml" },
    { id = "check-json" },
    { id = "check-added-large-files", args = ["--maxkb=1000"] },
    { id = "check-case-conflict" },
    { id = "check-merge-conflict" },
    { id = "check-symlinks" },
    { id = "detect-private-key" },
    { id = "mixed-line-ending" },
    { id = "fix-byte-order-marker" },
]

# Prevent executed notebooks from being committed
[[repos]]
repo = "https://github.com/kynan/nbstripout"
rev = "0.8.1"
hooks = [
    { id = "nbstripout" },
]

[[repos]]
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.30.1"
hooks = [
    { id = "gitleaks" },
]

# gitleaks scans .ipynb as raw JSON, where escaped/line-split source can evade
# its rules. This local hook converts each changed notebook to a throwaway .py,
# runs gitleaks on that clean Python, then deletes it (never committed).
[[repos]]
repo = "local"
hooks = [
    { id = "gitleaks-notebooks", name = "gitleaks (notebooks)", language = "python", entry = "python scripts/gitleaks_notebooks.py", files = '\.ipynb$', pass_filenames = true },
]
