name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual rebuilds (e.g. to pick up a fresh IFS init)
  schedule:
    # ~5 min after each long (00z/12z) IFS 15-day run lands in the store.
    # Store SLA is 7h past synoptic (07:00/19:00 UTC); observed write-complete
    # is ~07:25/19:13, so 07:30/19:30 reliably catches the fresh long init.
    # GHA cron only ever fires late, which is fine here. recompute.py falls
    # back to the prior complete long init if the newest isn't written yet.
    - cron: "30 7,19 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish (the data pull is slow).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: GHA # holds the ARRAYLAKE_TOKEN secret used by recompute
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Generate overlay data from latest IFS
        env:
          ARRAYLAKE_TOKEN: ${{ secrets.ARRAYLAKE_TOKEN }}
        run: uv run python backend/recompute.py --source ifs

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v5
