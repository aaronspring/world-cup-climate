name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual rebuilds (e.g. to pick up a fresh IFS init)

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish (the data pull is slow).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: GHA # holds the ARRAYLAKE_TOKEN secret used by recompute
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Generate overlay data from latest IFS
        env:
          ARRAYLAKE_TOKEN: ${{ secrets.ARRAYLAKE_TOKEN }}
        run: uv run python backend/recompute.py --source ifs

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v5
